<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalastussää Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --success: #4ade80; }
        body { font-family: "Arimo", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .search-box { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-wrapper { position: relative; flex: 1; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .suggestions-list { position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; border: 1px solid #334155; border-radius: 0 0 8px 8px; z-index: 1000; max-height: 200px; overflow-y: auto; display: none; }
        .suggestion-item { padding: 12px; cursor: pointer; font-size: 0.9rem; border-bottom: 1px solid #334155; color: #cbd5e1; }
        .suggestion-item:hover { background: #334155; color: var(--accent); }
        button { padding: 10px 15px; border-radius: 8px; border: none; background: var(--accent); color: #0f172a; font-weight: bold; cursor: pointer; }
        .btn-secondary { background: #334155; color: white; font-size: 0.8rem; margin-top: 5px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #334155; }
        h2 { margin-top: 0; color: var(--accent); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .bite-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .bite-score { font-size: 3rem; font-weight: 800; color: var(--success); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-item { background: #0f172a; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; display: block; margin-bottom: 4px; }
        .wind-indicator { display: inline-flex; align-items: center; gap: 8px; justify-content: center; font-weight: bold; }
        .wind-arrow { display: inline-block; font-size: 1.4rem; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .forecast-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; }
        /* Hour item adjusted to fit wind data */
        .hour-item { min-width: 80px; text-align: center; background: #0f172a; padding: 10px; border-radius: 10px; border: 1px solid #334155; }
        .forecast-wind { font-size: 0.75rem; margin-top: 5px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .saved-badge { display: inline-block; background: #075985; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="search-box">
            <div class="input-wrapper">
                <input type="text" id="city-input" placeholder="Hae paikkaa..." oninput="debouncedSearch()" autocomplete="off">
                <div id="suggestions" class="suggestions-list"></div>
            </div>
        </div>
        <div id="saved-indicator" class="saved-badge">⭐ TALLENNETTU</div>
        <h1 id="location-name" style="margin: 0 0 20px 0; font-size: 1.5rem;">Tunnistetaan sijaintia...</h1>
    </header>

    <div class="card">
        <h2>KALOJEN AKTIIVISUUS</h2>
        <div class="bite-row">
            <div id="bite-container" class="bite-score">--%</div>
            <div style="text-align: right;">
                <div id="moon-icon" style="font-size: 2.5rem;">🌑</div>
                <div id="moon-text" style="font-weight: bold;">Phase</div>
            </div>
        </div>
        <p id="solunar-period" style="font-size: 0.9rem; color: #94a3b8;">Lataa...</p>
        
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-label">Ilmanpaine</span>
                <span id="pressure-val">-- hPa</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Tuulen nopeus</span>
                <div class="wind-indicator">
                    <span id="wind-arrow" class="wind-arrow">↑</span>
                    <span id="wind-val">-- m/s</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Päivän pituus</h2>
        <div class="bite-row" style="font-size: 1.1rem;">
            <span>🌅 <span id="sunrise-time">--:--</span></span>
            <span>🌇 <span id="sunset-time">--:--</span></span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-secondary" onclick="saveLocation()">Tallenna suosikiksi</button>
            <button class="btn-secondary" style="background:#ef4444" onclick="clearSaved()">Resetoi</button>
        </div>
    </div>

    <div class="card">
        <h2>ennuste 24h</h2>
        <div class="forecast-scroll" id="forecast-container"></div>
    </div>
</div>

<script>
    let currentCoords = { lat: null, lon: null, name: "" };
    let searchTimeout;

    window.onload = () => {
        const saved = localStorage.getItem('angler_saved_loc');
        if (saved) {
            const data = JSON.parse(saved);
            currentCoords = data;
            document.getElementById('saved-indicator').style.display = 'inline-block';
            document.getElementById('location-name').innerText = `📍 ${data.name}`;
            updateDashboard(data.lat, data.lon);
        } else {
            startWithGPS();
        }
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.input-wrapper')) document.getElementById('suggestions').style.display = 'none';
        });
    };

    function startWithGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                updateDashboard(pos.coords.latitude, pos.coords.longitude);
            }, () => { document.getElementById('location-name').innerText = "Hae paikka hakukentästä."; });
        }
    }

    function debouncedSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(fetchSuggestions, 350);
    }

    async function fetchSuggestions() {
        const query = document.getElementById('city-input').value.trim();
        const list = document.getElementById('suggestions');
        if (query.length < 3) { list.style.display = 'none'; return; }
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`, {
                headers: { 'User-Agent': 'AnglerCast-App' }
            });
            const data = await response.json();
            if (data && data.length > 0) {
                list.innerHTML = data.map(item => `
                    <div class="suggestion-item" onclick="selectLocation(${item.lat}, ${item.lon}, '${item.display_name.replace(/'/g, "\\'")}')">
                        ${item.display_name}
                    </div>
                `).join('');
                list.style.display = 'block';
            } else { list.style.display = 'none'; }
        } catch (err) { console.error(err); }
    }

    function selectLocation(lat, lon, displayName) {
        const shortName = displayName.split(',')[0]; 
        currentCoords = { lat, lon, name: shortName };
        document.getElementById('location-name').innerText = `📍 ${shortName}`;
        document.getElementById('city-input').value = shortName;
        document.getElementById('suggestions').style.display = 'none';
        document.getElementById('saved-indicator').style.display = 'none';
        updateDashboard(lat, lon);
    }

    function saveLocation() {
        if (!currentCoords.lat) return;
        localStorage.setItem('angler_saved_loc', JSON.stringify(currentCoords));
        document.getElementById('saved-indicator').style.display = 'inline-block';
        alert("Tallennettu!");
    }

    function clearSaved() {
        localStorage.removeItem('angler_saved_loc');
        location.reload();
    }

    function getWindColor(speed) {
        if (speed <= 3) return "#7dd3fc"; // Sky Blue
        if (speed <= 7) return "#4ade80"; // Green
        if (speed <= 13) return "#fde047"; // Yellow
        if (speed <= 20) return "#fb923c"; // Orange
        return "#ef4444";                 // Red
    }

    async function updateDashboard(lat, lon) {
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,surface_pressure,wind_speed_10m,wind_direction_10m,weather_code&daily=sunrise,sunset&timezone=auto&forecast_days=2`;
            const res = await fetch(url);
            const data = await res.json();

            const now = new Date();
            const moon = SunCalc.getMoonIllumination(now);
            const moonPos = SunCalc.getMoonPosition(now, lat, lon);
            
            const formatTime = (iso) => new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('sunrise-time').innerText = formatTime(data.daily.sunrise[0]);
            document.getElementById('sunset-time').innerText = formatTime(data.daily.sunset[0]);
            document.getElementById('moon-text').innerText = getPhaseName(moon.phase);
            document.getElementById('moon-icon').innerText = getMoonEmoji(moon.phase);

            const currentHourIdx = new Date().getHours();
            const pressure = data.hourly.surface_pressure[currentHourIdx];
            const windSpeedMs = data.hourly.wind_speed_10m[currentHourIdx];
            const windDeg = data.hourly.wind_direction_10m[currentHourIdx];
            
            const windColor = getWindColor(windSpeedMs);
            const windValEl = document.getElementById('wind-val');
            const windArrowEl = document.getElementById('wind-arrow');

            document.getElementById('pressure-val').innerText = `${Math.round(pressure)} hPa`;
            windValEl.innerText = `${windSpeedMs.toFixed(1)} m/s`;
            windValEl.style.color = windColor;
            
            windArrowEl.style.transform = `rotate(${windDeg}deg)`;
            windArrowEl.style.color = windColor;

            let score = 50;
            if (Math.abs(moonPos.altitude) > 1.2) score += 25; 
            if (pressure < 1012) score += 15; 
            if (windSpeedMs > 1.5 && windSpeedMs < 5.5) score += 10; 
            if (windSpeedMs > 13) score -= 30;

            document.getElementById('bite-container').innerText = `${Math.max(0, Math.min(score, 99))}%`;
            document.getElementById('solunar-period').innerText = score > 75 ? "🔥 Paras syöntiaika käynnissä!" : "Normaali aktiivisuus.";

            let forecastHTML = "";
            for (let i = currentHourIdx; i < currentHourIdx + 24; i++) {
                const time = new Date(data.hourly.time[i]);
                const fWindSpeed = data.hourly.wind_speed_10m[i];
                const fWindDeg = data.hourly.wind_direction_10m[i];
                const fWindColor = getWindColor(fWindSpeed);

                forecastHTML += `
                    <div class="hour-item">
                        <div style="font-size: 0.7rem; color: #94a3b8;">${time.getHours()}:00</div>
                        <div style="font-size: 1.2rem; margin: 5px 0;">${getWeatherEmoji(data.hourly.weather_code[i])}</div>
                        <div style="font-weight: bold;">${Math.round(data.hourly.temperature_2m[i])}°</div>
                        <div class="forecast-wind" style="color: ${fWindColor}">
                            <span style="transform: rotate(${fWindDeg}deg); display: inline-block; font-size: 1rem;">↑</span>
                            <span>${fWindSpeed.toFixed(1)}</span>
                        </div>
                    </div>
                `;
            }
            document.getElementById('forecast-container').innerHTML = forecastHTML;

        } catch (err) { console.error(err); }
    }

    function getWeatherEmoji(code) {
        if (code === 0) return "☀️"; if (code <= 3) return "🌤️"; if (code <= 48) return "🌫️";
        if (code <= 67) return "🌧️"; if (code <= 77) return "❄️"; if (code <= 82) return "🌦️";
        return "⛈️";
    }

    function getMoonEmoji(p) {
        const icons = ["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"];
        return icons[Math.floor(p * 8) % 8];
    }

    function getPhaseName(p) {
        if (p < 0.03) return "Uusikuu"; 
        if (p < 0.22) return "Kasvava sirppi";
        if (p < 0.28) return "Ensimmäinen neljännes"; 
        if (p < 0.47) return "Kasvava puolikuu";
        if (p < 0.53) return "Täysikuu"; 
        if (p < 0.72) return "Vähenevä puolikuu";
        if (p < 0.78) return "Viimeinen neljännes"; 
        return "Vähenevä sirppi";
    }
</script>
</body>
</html>
